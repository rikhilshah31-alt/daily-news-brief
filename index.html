<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Daily News Brief</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { font-family: Arial, sans-serif; max-width: 900px; margin: 24px auto; padding: 0 12px; color:#111; }
    .row { display:flex; gap:10px; align-items:center; margin:12px 0; }
    input { flex:1; padding:12px; font-size:16px; }
    button { padding:12px 16px; font-size:16px; cursor:pointer; }
    .meta { color:#555; margin:10px 0 16px; }
    .item { padding:14px 0; border-bottom:1px solid #eee; }
    .date { font-size:12px; color:#777; margin-bottom:6px; }
    .headline { font-size:16px; font-weight:700; color:#111; display:block; margin-bottom:6px; }
    .headline a { color:#111 !important; text-decoration:none; }
    .headline a:hover { text-decoration:underline; }
    .snippet { color:#333; line-height:1.35; }
    .debug { margin-top:18px; padding:12px; background:#fafafa; border:1px solid #eee; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; font-size:12px; white-space:pre-wrap; }
    .err { color:#b00020; font-weight:700; }
  </style>
</head>
<body>
  <h1>Daily News Brief</h1>
  <div class="row">
    <input id="q" placeholder="e.g. housing london rent" />
    <button onclick="run()">Get brief</button>
  </div>

  <div id="meta" class="meta"></div>
  <div id="results"></div>

  <div id="debug" class="debug" style="display:none;"></div>

  <script>
    // Version tag so we can confirm the page updated
    const VERSION = "v2-render-fix-09Apr2026";

    function googleNewsRss(query) {
      const q = encodeURIComponent(query.trim());
      return `https://news.google.com/rss/search?q=${q}&hl=en-GB&gl=GB&ceid=GB:en`;
    }

    function stripHtml(html) {
      const tmp = document.createElement("div");
      tmp.innerHTML = html || "";
      return (tmp.textContent || tmp.innerText || "").trim();
    }

    async function run() {
      const q = document.getElementById("q").value.trim();
      const meta = document.getElementById("meta");
      const results = document.getElementById("results");
      const debug = document.getElementById("debug");

      results.innerHTML = "";
      debug.style.display = "none";
      debug.textContent = "";

      if (!q) return;

      meta.textContent = `Loading… (${VERSION})`;

      const rssUrl = googleNewsRss(q);
      const apiUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;

      let data;
      try {
        const res = await fetch(apiUrl);
        data = await res.json();
      } catch (e) {
        meta.innerHTML = `<span class="err">Network error loading news.</span> (${VERSION})`;
        return;
      }

      // Debug panel: show what we got back
      debug.style.display = "block";
      debug.textContent =
        `DEBUG (${VERSION})\n` +
        `Query: ${q}\n` +
        `RSS: ${rssUrl}\n` +
        `Items returned: ${data?.items?.length ?? 0}\n\n` +
        `First item:\n${JSON.stringify(data?.items?.[0] ?? null, null, 2)}\n\n` +
        `Second item:\n${JSON.stringify(data?.items?.[1] ?? null, null, 2)}\n`;

      if (!data || !data.items) {
        meta.innerHTML = `<span class="err">Couldn’t load headlines (rate limit). Try again in 1–2 minutes.</span> (${VERSION})`;
        return;
      }

      meta.textContent = `Found ${data.items.length} headlines (${VERSION})`;

      data.items.slice(0, 20).forEach(item => {
        const div = document.createElement("div");
        div.className = "item";

        const pub = item.pubDate ? new Date(item.pubDate).toLocaleString() : "";
        const titleText = (item.title || "").trim() || "(No title returned)";
        const snippetText = stripHtml(item.description || "");

        // Build DOM safely (no innerHTML for title)
        const date = document.createElement("div");
        date.className = "date";
        date.textContent = pub;

        const headline = document.createElement("div");
        headline.className = "headline";

        const a = document.createElement("a");
        a.href = item.link || "#";
        a.target = "_blank";
        a.rel = "noopener";
        a.textContent = titleText;

        headline.appendChild(a);

        const snippet = document.createElement("div");
        snippet.className = "snippet";
        snippet.textContent = snippetText;

        div.appendChild(date);
        div.appendChild(headline);
        if (snippetText) div.appendChild(snippet);

        results.appendChild(div);
      });
    }

    // Auto-run from shared link
    const params = new URLSearchParams(location.search);
    if (params.get("q")) {
      document.getElementById("q").value = params.get("q");
      run();
    }
  </script>
</body>
</html>
``
